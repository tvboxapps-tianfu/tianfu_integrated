<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>天赋管家</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="天赋">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="icon" type="image/png" href="/icon.png" sizes="192x192">
  <style>
    body { font-family: sans-serif; background: #1a1a1a; color: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    #chat { flex: 1; overflow-y: auto; margin-bottom: 20px; border: 1px solid #444; border-radius: 10px; padding: 10px; background: #2a2a2a; }
    .msg { margin: 10px 0; padding: 10px; border-radius: 10px; max-width: 80%; clear: both; }
    .user { background: #0078d4; color: white; float: right; }
    .tianfu { background: #444; color: #eee; float: left; }
    .controls { display: flex; gap: 10px; }
    button { flex: 1; padding: 15px; font-size: 18px; border: none; border-radius: 10px; background: #0078d4; color: white; cursor: pointer; touch-action: none; user-select: none; }
    #lockBtn {
      flex: 0.3;
      background: #555;
      font-size: 20px;
    }
    #lockBtn.locked {
      background: #c0392b;
      color: white;
    }

    /* ===== 动态加载点动画 ===== */
    @keyframes dotPulse {
      0%, 100% { opacity: 0.2; transform: translateY(0); }
      50%      { opacity: 1;   transform: translateY(-5px); }
    }
    .loading-dots span {
      display: inline-block;
      animation: dotPulse 1.4s infinite;
      font-size: 24px;
      line-height: 1;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body>
  <h2>🤵 天赋管家</h2>
  <div id="chat"></div>
  <div class="controls">
    <button id="micBtn">🎤 按住说话</button>
    <button id="lockBtn">🔓</button>
  </div>

  <script>
    const chatDiv = document.getElementById('chat');
    const micBtn = document.getElementById('micBtn');
    const lockBtn = document.getElementById('lockBtn');
    let history = [];
    let recognition;
    let isLocked = false;
    let isHolding = false;
    let micButtonLocked = false;

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
      return div;
    }

    // ========== 语音输出 ==========
    let currentAudio = null;

    async function speakText(text) {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      try {
        const resp = await fetch('/speak', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text: text})
        });
        if (!resp.ok) throw new Error('语音请求失败');
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        currentAudio = audio;
        audio.play();
        audio.onended = () => { currentAudio = null; };
      } catch(e) {
        console.error('语音合成失败：', e);
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'zh-CN';
          window.speechSynthesis.speak(utterance);
        }
      }
    }

    // ========== 发送消息（动态加载点）==========
    async function sendMessage(message) {
      addMessage(message, 'user');

      // 创建动态“...”占位符
      const placeholder = document.createElement('div');
      placeholder.className = 'msg tianfu loading-dots';
      placeholder.innerHTML = '<span>.</span><span>.</span><span>.</span>';
      chatDiv.appendChild(placeholder);
      chatDiv.scrollTop = chatDiv.scrollHeight;

      const resp = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: message, history: history})
      });
      const data = await resp.json();

      // 替换为真实回复（移除动画类）
      placeholder.className = 'msg tianfu';
      placeholder.textContent = data.reply;
      speakText(data.reply);

      history.push({role: 'user', content: message});
      history.push({role: 'assistant', content: data.reply});
      if (history.length > 20) history = history.slice(-20);
    }

    // ========== 语音输入（支持锁定） ==========
    function startRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('您的浏览器不支持语音识别，请使用 Chrome。');
        return;
      }
      if (recognition) {
        recognition.abort();
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN';
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        sendMessage(transcript);
      };
      recognition.onerror = (event) => {
        console.error('语音识别错误', event.error);
        if (event.error === 'no-speech' || event.error === 'aborted') {
          // 正常
        } else {
          addMessage('抱歉，没听清。', 'tianfu');
        }
      };
      recognition.onend = () => {
        if (micButtonLocked || isHolding) {
          try {
            recognition.start();
          } catch (e) {}
        } else {
          micBtn.textContent = '🎤 按住说话';
        }
      };

      recognition.start();
      micBtn.textContent = '🔴 正在听...';
    }

    function stopRecognition() {
      isHolding = false;
      micButtonLocked = false;
      if (recognition) {
        recognition.abort();
        recognition = null;
      }
      micBtn.textContent = '🎤 按住说话';
      if (!isLocked) {
        lockBtn.textContent = '🔓';
        lockBtn.classList.remove('locked');
      }
    }

    lockBtn.addEventListener('click', () => {
      isLocked = !isLocked;
      if (isLocked) {
        lockBtn.textContent = '🔒';
        lockBtn.classList.add('locked');
      } else {
        lockBtn.textContent = '🔓';
        lockBtn.classList.remove('locked');
        if (micButtonLocked) {
          stopRecognition();
        }
      }
    });

    micBtn.addEventListener('click', (e) => {
      if (!isLocked) return;
      if (micButtonLocked) {
        stopRecognition();
      } else {
        micButtonLocked = true;
        isHolding = true;
        startRecognition();
      }
    });

    micBtn.addEventListener('touchstart', (e) => {
      if (isLocked) return;
      e.preventDefault();
      isHolding = true;
      startRecognition();
    });
    micBtn.addEventListener('touchend', (e) => {
      if (isLocked) return;
      e.preventDefault();
      stopRecognition();
    });
    micBtn.addEventListener('touchcancel', (e) => {
      if (isLocked) return;
      e.preventDefault();
      stopRecognition();
    });

    micBtn.addEventListener('pointerdown', (e) => {
      if (isLocked || e.pointerType === 'touch') return;
      isHolding = true;
      startRecognition();
    });
    micBtn.addEventListener('pointerup', (e) => {
      if (isLocked || e.pointerType === 'touch') return;
      stopRecognition();
    });
    micBtn.addEventListener('pointerleave', (e) => {
      if (isLocked || e.pointerType === 'touch') return;
      stopRecognition();
    });

    // ========== 推送订阅 ==========
    let swRegistration = null;
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        swRegistration = await navigator.serviceWorker.register('/sw.js');
        await subscribeUser();
      });
    }

    async function subscribeUser() {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') return;
      const vapidPublicKey = 'BJr_tACbqDfV_wonTD96-Yfm8Cg9uQkvUIMfyHpLlSQ_tyAg2vI4v5nLlO_kECYioqgM6knD84qx2UtJjk9XCeY';
      const convertedKey = urlBase64ToUint8Array(vapidPublicKey);
      const subscription = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: convertedKey
      });
      await fetch('/subscribe', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(subscription)
      });
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }
  </script>
</body>
</html>
